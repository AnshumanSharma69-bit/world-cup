<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FIFA World Cup Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Orbitron',sans-serif;
      background:#040816;
      color:white;
      overflow-x:hidden;
      min-height:100vh;
      padding:40px;
      background-image:
      radial-gradient(circle at top left,#00f7ff22,transparent 25%),
      radial-gradient(circle at bottom right,#ff00ff22,transparent 25%);
    }

    h1{
      text-align:center;
      font-size:4rem;
      margin-bottom:10px;
      color:#00f7ff;
      text-shadow:0 0 20px #00f7ff;
      letter-spacing:4px;
    }

    .subtitle{
      text-align:center;
      color:#aaa;
      margin-bottom:50px;
      font-size:1rem;
    }

    .years-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .year-card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,247,255,0.3);
      border-radius:20px;
      padding:30px 10px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
      backdrop-filter:blur(10px);
      box-shadow:0 0 20px rgba(0,247,255,0.1);
    }

    .year-card:hover{
      transform:translateY(-5px) scale(1.03);
      border-color:#00f7ff;
      box-shadow:0 0 30px rgba(0,247,255,0.4);
    }

    .year-card.active{
      background:#00f7ff22;
      border-color:#00f7ff;
    }

    .year{
      font-size:2rem;
      font-weight:800;
      color:#00f7ff;
    }

    .stage-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      justify-content:center;
      margin-bottom:40px;
    }

    .stage-btn{
      padding:12px 24px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-family:'Orbitron',sans-serif;
      font-weight:600;
      background:#111827;
      color:white;
      border:1px solid #333;
      transition:0.3s;
    }

    .stage-btn:hover{
      background:#00f7ff22;
      border-color:#00f7ff;
      color:#00f7ff;
    }

    .stage-btn.active{
      background:#00f7ff;
      color:black;
      box-shadow:0 0 20px #00f7ff;
    }

    #matches-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
      gap:25px;
    }

    .match-card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:25px;
      backdrop-filter:blur(12px);
      transition:0.3s;
      position:relative;
      overflow:hidden;
    }

    .match-card::before{
      content:'';
      position:absolute;
      width:150%;
      height:2px;
      background:linear-gradient(90deg,transparent,#00f7ff,transparent);
      top:0;
      left:-25%;
      animation:scan 4s linear infinite;
    }

    @keyframes scan{
      0%{transform:translateX(-100%);}
      100%{transform:translateX(100%);}
    }

    .match-card:hover{
      transform:translateY(-6px);
      border-color:#00f7ff;
      box-shadow:0 0 30px rgba(0,247,255,0.3);
    }

    .match-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      color:#00f7ff;
      font-size:0.9rem;
    }

    .teams{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:25px 0;
    }

    .team{
      width:35%;
      text-align:center;
      font-size:1.1rem;
      font-weight:700;
    }

    .score{
      width:30%;
      text-align:center;
      font-size:2.4rem;
      color:#00ff9d;
      font-weight:800;
      text-shadow:0 0 15px #00ff9d;
    }

    .match-info{
      margin-top:15px;
      color:#bbb;
      font-size:0.9rem;
      line-height:1.8;
    }

    .empty{
      text-align:center;
      color:#888;
      margin-top:50px;
      font-size:1.2rem;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      h1{
        font-size:2.3rem;
      }

      .score{
        font-size:1.8rem;
      }

      .team{
        font-size:0.9rem;
      }

    }

  </style>
</head>

<body>

  <h1>FIFA WORLD CUP ARCHIVE</h1>

  <div class="subtitle">
    Explore every World Cup match in history
  </div>

  <div class="years-grid" id="years-grid"></div>

  <div class="stage-buttons">

    <button class="stage-btn" data-stage="Final">
      FINAL
    </button>

    <button class="stage-btn" data-stage="Semi-finals">
      SEMI FINAL
    </button>

    <button class="stage-btn" data-stage="Quarter-finals">
      QUARTER FINAL
    </button>

    <button class="stage-btn" data-stage="Group">
      GROUP STAGE
    </button>

  </div>

  <div id="matches-container">
    <div class="empty">
      Select a year and a stage to view matches
    </div>
  </div>

  <script type="module" src="matches.js"></script>

</body>

</html>
