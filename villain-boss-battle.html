<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Villain Cup — Boss Battle TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   ROOT DESIGN TOKENS  (unchanged palette)
════════════════════════════════════════════ */
:root {
  --void:#03030D; --deep:#07071C; --surface:#0C0C22; --surface2:#11112A;
  --ambient:#00F0FF; --cyan:#00F0FF; --red:#FF002E;
  --gold:#FFB800; --green:#00FF88; --purple:#9000FF;
  --text:#E0E0F5; --muted:#5A5A90; --dim:rgba(224,224,245,0.06);
  --font-d:'Bebas Neue',sans-serif;
  --font-ui:'Orbitron',sans-serif;
  --font-b:'Rajdhani',sans-serif;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --card-w:clamp(160px,22vw,210px);
  --card-h:clamp(240px,32vw,310px);
}

/* ═══════════════════════════════════════════
   RESET + BASE
════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{background:var(--void);height:100%}
body{
  color:var(--text); font-family:var(--font-b);
  overflow-x:hidden; min-height:100vh;
  background:var(--void);
  display:flex; flex-direction:column; align-items:center;
  padding:0 0 60px;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:var(--cyan)}
::selection{background:rgba(0,240,255,.2);color:var(--cyan)}

/* ═══════════════════════════════════════════
   AMBIENT BACKGROUND
════════════════════════════════════════════ */
#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(3,3,13,.92) 100%);
}
#grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,240,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,.025) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridDrift 25s linear infinite;
}
@keyframes gridDrift{from{background-position:0 0}to{background-position:60px 60px}}

#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 3px);
  opacity:.4;
}

/* ═══════════════════════════════════════════
   BURST CANVAS
════════════════════════════════════════════ */
#burst-canvas{position:fixed;inset:0;z-index:9000;pointer-events:none}

/* ═══════════════════════════════════════════
   SOUND TOGGLE
════════════════════════════════════════════ */
#sound-toggle{
  position:fixed;top:18px;right:18px;z-index:9999;
  background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.25);
  color:var(--cyan);font-family:var(--font-ui);font-size:9px;letter-spacing:.2em;
  padding:8px 14px;cursor:pointer;transition:all .3s;
}
#sound-toggle:hover{background:rgba(0,240,255,.18);box-shadow:0 0 15px rgba(0,240,255,.3)}
#sound-toggle.muted{color:var(--muted);border-color:rgba(90,90,144,.4)}

/* ═══════════════════════════════════════════
   HUD CORNERS
════════════════════════════════════════════ */
.hud-c{position:fixed;width:22px;height:22px;pointer-events:none;z-index:9990;opacity:.5}
.hud-c::before,.hud-c::after{content:'';position:absolute;background:var(--cyan)}
.hud-c::before{width:2px;height:14px}.hud-c::after{width:14px;height:2px}
.hud-c.tl{top:16px;left:16px}.hud-c.tl::before{top:0;left:0}.hud-c.tl::after{top:0;left:0}
.hud-c.tr{top:16px;right:16px;transform:scaleX(-1)}
.hud-c.bl{bottom:16px;left:16px;transform:scaleY(-1)}
.hud-c.br{bottom:16px;right:16px;transform:scale(-1,-1)}

/* ═══════════════════════════════════════════
   TOP BAR
════════════════════════════════════════════ */
.top-bar{
  position:relative;z-index:10;
  width:100%;max-width:1000px;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(0,240,255,.06);
  flex-wrap:wrap;gap:10px;
}
.back-btn{
  color:var(--cyan);font-family:var(--font-ui);font-size:9px;
  text-decoration:none;letter-spacing:.22em;
  padding:10px 18px;border:1px solid rgba(0,240,255,.2);
  transition:all .3s;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.back-btn:hover{background:rgba(0,240,255,.1);box-shadow:0 0 20px rgba(0,240,255,.25)}
.scoreboard{
  font-family:var(--font-ui);font-size:11px;letter-spacing:.2em;color:var(--gold);
  background:rgba(255,184,0,.06);padding:10px 18px;
  border:1px solid rgba(255,184,0,.2);
  display:flex;align-items:center;gap:14px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.streak-num{
  font-family:var(--font-d);font-size:30px;line-height:1;color:var(--text);
  transition:color .3s;
}
.streak-num.flash{animation:streakFlash .5s ease forwards}
@keyframes streakFlash{
  0%{transform:scale(1.5);color:var(--gold);text-shadow:0 0 20px var(--gold)}
  100%{transform:scale(1);color:var(--text);text-shadow:none}
}

/* ═══════════════════════════════════════════
   ARENA BOARD
════════════════════════════════════════════ */
.arena-board{
  position:relative;z-index:10;
  width:100%;max-width:1000px;
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
  padding:20px 16px;
}
.zone-label{
  font-family:var(--font-ui);font-size:8px;letter-spacing:.35em;color:var(--muted);
  text-align:center;margin-bottom:-6px;
}
.arena-row{
  display:flex;justify-content:center;
  gap:clamp(20px,4vw,50px);
  min-height:var(--card-h);
  align-items:flex-end;
  width:100%;
  position:relative;z-index:2;
  flex-wrap:nowrap;
}

/* ═══════════════════════════════════════════
   STAT TARGET DISPLAY
════════════════════════════════════════════ */
.stat-target-strip{
  width:100%;max-width:500px;
  background:rgba(0,240,255,.04);
  border:1px solid rgba(0,240,255,.15);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:center;gap:16px;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
}
.stat-target-label{font-family:var(--font-ui);font-size:8px;letter-spacing:.35em;color:var(--muted)}
.stat-target-name{
  font-family:var(--font-d);font-size:clamp(22px,4vw,32px);letter-spacing:.06em;
  color:var(--gold);text-shadow:0 0 14px rgba(255,184,0,.5);
}

/* ═══════════════════════════════════════════
   BATTLE LOG
════════════════════════════════════════════ */
.battle-log{
  width:100%;max-width:600px;
  text-align:center;font-family:var(--font-ui);
  font-size:clamp(11px,1.6vw,15px);letter-spacing:.14em;
  color:var(--cyan);
  background:rgba(0,240,255,.04);
  padding:20px 24px;
  border:1px solid rgba(0,240,255,.18);
  min-height:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:inset 0 0 30px rgba(0,240,255,.04);
  transition:border-color .5s,box-shadow .5s;
  position:relative;z-index:10;
  overflow:hidden;
}
.battle-log::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,240,255,.03),transparent);
  animation:logSheen 4s linear infinite;
  pointer-events:none;
}
@keyframes logSheen{from{transform:translateX(-100%)}to{transform:translateX(100%)} }
.log-result{font-size:clamp(22px,4vw,38px);font-weight:700;margin-bottom:6px;letter-spacing:.06em}
.log-detail{font-size:clamp(10px,1.4vw,13px);color:var(--text);letter-spacing:.1em;margin-top:6px}

/* ═══════════════════════════════════════════
   VS BADGE
════════════════════════════════════════════ */
.vs-badge{
  font-family:var(--font-d);font-size:clamp(50px,8vw,80px);
  color:var(--red);text-shadow:0 0 30px var(--red);
  pointer-events:none;opacity:0;transform:scale(0);
  position:relative;z-index:5;line-height:1;
}

/* ═══════════════════════════════════════════
   TCG CARD SYSTEM
════════════════════════════════════════════ */
.tcg-card{
  width:var(--card-w);
  height:var(--card-h);
  position:relative;
  transform-style:preserve-3d;
  perspective:1200px;
  transition:box-shadow .3s;
  flex-shrink:0;
}

/* BOTH FACES */
.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border:1px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;
  overflow:hidden;border-radius:6px;
  transition:border-color .3s;
}

/* PLAYER PHOTO FACE */
.player-front{
  background-size:cover;background-position:center top;
  background-color:var(--surface2);
  display:flex;flex-direction:column;justify-content:flex-end;
}
.player-front::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(3,3,13,.96) 0%,rgba(3,3,13,.3) 45%,transparent 75%);
  z-index:1;pointer-events:none;
}
.name-banner{
  position:relative;z-index:2;
  padding:12px 10px;text-align:center;
  font-family:var(--font-d);font-size:clamp(18px,2.5vw,26px);
  line-height:1;letter-spacing:.05em;
}
.card-badge{
  position:absolute;top:8px;left:8px;z-index:3;
  font-family:var(--font-ui);font-size:7px;letter-spacing:.18em;
  padding:3px 8px;border:1px solid;
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}

/* STATS BACK */
.stats-back{
  background:linear-gradient(145deg,var(--surface2),var(--void));
  transform:rotateY(180deg);
  padding:12px;
  position:relative;
}
.stats-back::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 30%,rgba(255,255,255,.04),transparent);
  pointer-events:none;
}

/* AI SLEEVE */
.ai-sleeve{
  background:
    repeating-linear-gradient(45deg,#07071C,#07071C 14px,#03030D 14px,#03030D 28px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;
  z-index:10;
}
.sleeve-logo{font-family:var(--font-d);font-size:28px;color:rgba(255,255,255,.12);letter-spacing:.12em}
.sleeve-hex{
  width:48px;height:48px;
  background:rgba(0,240,255,.06);
  border:1px solid rgba(0,240,255,.18);
  clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);
}

/* HOLO SWEEP on hover */
.card-face::after{
  content:'';position:absolute;inset:-100%;pointer-events:none;
  background:linear-gradient(115deg,transparent 20%,rgba(255,255,255,.08) 45%,rgba(255,255,255,.18) 50%,rgba(255,255,255,.08) 55%,transparent 80%);
  transform:translateX(-100%);transition:transform .6s;z-index:5;
}
.tcg-card.playable:hover .card-face::after{transform:translateX(100%)}

/* HOVER LIFT */
.tcg-card.playable{
  cursor:pointer;
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275),box-shadow .3s;
}
.tcg-card.playable:hover{
  transform:translateY(-16px) scale(1.06) rotateY(4deg);
  box-shadow:0 24px 48px rgba(0,0,0,.85);
  z-index:20;
}

/* CARD STAT ROWS */
.card-header{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding-bottom:8px;margin-bottom:10px;
  text-align:center;position:relative;z-index:2;
}
.card-code{
  font-family:var(--font-d);font-size:clamp(16px,2.2vw,22px);
  line-height:1;letter-spacing:.05em;
}
.card-real{
  font-family:var(--font-b);font-size:10px;color:var(--muted);
  margin-top:3px;text-transform:uppercase;font-weight:600;
}
.card-stat-row{
  display:flex;justify-content:space-between;
  padding:8px 10px;
  background:rgba(255,255,255,.025);
  margin-bottom:5px;
  font-family:var(--font-ui);font-size:clamp(9px,1.2vw,11px);
  font-weight:700;letter-spacing:.1em;
  border:1px solid transparent;
  transition:all .35s;
  position:relative;z-index:2;
}
.card-stat-row.active-stat{
  background:rgba(255,184,0,.14);
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(255,184,0,.25),inset 0 0 8px rgba(255,184,0,.08);
  transform:scale(1.04);
}

/* ═══════════════════════════════════════════
   RARITY AURA (on .tcg-card via --pc-color)
════════════════════════════════════════════ */
.tcg-card.rarity-legendary .card-face{
  border-color:rgba(255,184,0,.35);
}
.tcg-card.rarity-legendary::before{
  content:'';position:absolute;inset:-2px;z-index:-1;
  background:linear-gradient(135deg,var(--gold),rgba(144,0,255,.8),var(--gold));
  border-radius:8px;
  opacity:.35;animation:rarityPulse 2.5s ease-in-out infinite;
}
.tcg-card.rarity-epic::before{
  content:'';position:absolute;inset:-2px;z-index:-1;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  border-radius:8px;opacity:.25;animation:rarityPulse 3s ease-in-out infinite;
}
@keyframes rarityPulse{0%,100%{opacity:.2}50%{opacity:.45}}

/* ═══════════════════════════════════════════
   DEFEATED / VICTORIOUS STATES
════════════════════════════════════════════ */
.tcg-card.defeated{
  filter:grayscale(100%) brightness(0.35);
  opacity:.45;pointer-events:none;
  transition:all .5s ease;
}
.tcg-card.victorious{
  pointer-events:none;
  animation:victoriousPulse 1.5s ease-in-out infinite;
}
@keyframes victoriousPulse{
  0%,100%{box-shadow:0 0 20px currentColor}
  50%{box-shadow:0 0 50px currentColor,0 0 80px currentColor}
}

/* ═══════════════════════════════════════════
   ROUND TRANSITION OVERLAY
════════════════════════════════════════════ */
#round-overlay{
  position:fixed;inset:0;z-index:8000;pointer-events:none;
  background:var(--void);
  clip-path:polygon(0 0,0 0,0 100%,0 100%);
}

/* ═══════════════════════════════════════════
   ACTION BUTTON
════════════════════════════════════════════ */
.btn-p{
  background:var(--ambient);color:var(--void);
  font-family:var(--font-ui);font-size:clamp(9px,1.2vw,11px);
  padding:13px 28px;border:none;cursor:pointer;
  font-weight:700;letter-spacing:.22em;margin-top:14px;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:box-shadow .3s,transform .15s;
  position:relative;overflow:hidden;
}
.btn-p::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.25),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-p:hover{box-shadow:0 0 30px var(--cyan),0 0 60px rgba(0,240,255,.2)}
.btn-p:hover::after{transform:translateX(100%)}
.btn-p:active{transform:scale(.97)}

/* ═══════════════════════════════════════════
   WIN STREAK MILESTONE
════════════════════════════════════════════ */
#milestone-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:9500;pointer-events:none;
  background:linear-gradient(135deg,var(--void),var(--surface));
  border:1px solid var(--gold);
  padding:28px 48px;text-align:center;
  box-shadow:0 0 60px rgba(255,184,0,.3),0 0 120px rgba(255,184,0,.12);
}
#milestone-banner.show{animation:milestoneIn .6s var(--ease-out) forwards}
@keyframes milestoneIn{
  from{transform:translate(-50%,-50%) scale(0);opacity:0}
  to{transform:translate(-50%,-50%) scale(1);opacity:1}
}
.milestone-title{font-family:var(--font-d);font-size:52px;color:var(--gold);letter-spacing:.08em;text-shadow:0 0 20px var(--gold)}
.milestone-sub{font-family:var(--font-ui);font-size:9px;letter-spacing:.3em;color:var(--muted);margin-top:8px}

/* ═══════════════════════════════════════════
   STATS HISTORY PANEL
════════════════════════════════════════════ */
#stats-panel{
  position:relative;z-index:10;
  width:100%;max-width:1000px;
  display:flex;justify-content:center;gap:20px;
  padding:0 16px;flex-wrap:wrap;
}
.stat-pill{
  font-family:var(--font-ui);font-size:9px;letter-spacing:.2em;
  padding:8px 16px;border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.02);
  display:flex;align-items:center;gap:10px;
}
.stat-pill span:last-child{color:var(--text);font-size:14px;font-family:var(--font-d)}

/* ═══════════════════════════════════════════
   MOBILE RESPONSIVE
════════════════════════════════════════════ */
@media(max-width:600px){
  .arena-row{gap:14px}
  .top-bar{padding:14px 12px}
  .battle-log{padding:16px 14px}
  #sound-toggle{font-size:8px;padding:7px 10px}
}

/* ═══════════════════════════════════════════
   KEYBOARD / TOUCH FOCUS FIX
════════════════════════════════════════════ */
.tcg-card.playable:focus-visible{
  outline:2px solid var(--cyan);outline-offset:4px;
}
</style>
</head>
<body>

<!-- HUD Corners -->
<div class="hud-c tl"></div><div class="hud-c tr"></div>
<div class="hud-c bl"></div><div class="hud-c br"></div>

<!-- Ambient -->
<div id="vignette"></div>
<div id="grid-bg"></div>
<div id="scanlines"></div>

<!-- Particle Canvas -->
<canvas id="burst-canvas"></canvas>

<!-- Sound Toggle -->
<button id="sound-toggle" onclick="toggleSound()" title="Toggle Sound">🔊 SFX</button>

<!-- Round Transition Overlay -->
<div id="round-overlay"></div>

<!-- Milestone Banner -->
<div id="milestone-banner">
  <div class="milestone-title" id="milestone-text">3 WIN STREAK</div>
  <div class="milestone-sub">DOMINATION · KEEP GOING</div>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <a href="index.html" class="back-btn">← RETURN TO DATABASE</a>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="scoreboard">
      BEST STREAK &nbsp;<span class="streak-num" id="best-streak">0</span>
    </div>
    <div class="scoreboard">
      WIN STREAK &nbsp;<span class="streak-num" id="win-streak">0</span>
    </div>
  </div>
</div>

<!-- Stat target display -->
<div class="arena-board">
  <div class="stat-target-strip">
    <span class="stat-target-label">COMBAT VECTOR</span>
    <span class="stat-target-name" id="stat-name-display">LOADING</span>
  </div>

  <!-- Enemy Hand Zone -->
  <div class="zone-label">// ENEMY OPERATIVES //</div>
  <div class="arena-row" id="enemy-zone"></div>

  <!-- VS Badge (center) -->
  <div class="vs-badge" id="vs-badge">VS</div>

  <!-- Battle Log -->
  <div class="battle-log" id="battle-log">
    <span style="color:var(--muted);font-size:10px">SYSTEM INITIALIZING…</span>
  </div>

  <!-- Player Hand Zone -->
  <div class="arena-row" id="player-hand"></div>
  <div class="zone-label">// YOUR COMBATANTS — SELECT ONE //</div>
</div>

<!-- Session Stats Bar -->
<div id="stats-panel">
  <div class="stat-pill">
    <span style="color:var(--muted)">WINS</span>
    <span id="stat-wins">0</span>
  </div>
  <div class="stat-pill">
    <span style="color:var(--muted)">LOSSES</span>
    <span id="stat-losses">0</span>
  </div>
  <div class="stat-pill">
    <span style="color:var(--muted)">DRAWS</span>
    <span id="stat-draws">0</span>
  </div>
  <div class="stat-pill">
    <span style="color:var(--muted)">WIN RATE</span>
    <span id="stat-rate">0%</span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   PLAYER DATA
════════════════════════════════════════════ */
const P = [
  {id:'vinicius', code:'CARNIVAL GHOST',  real:'Vinícius Jr.',     tc:'#00C851', rarity:'legendary', img:'images/neymar.jpg',    stats:{SPD:98,FIN:88,DRB:96,AUR:90}},
  {id:'messi',   code:'THE GOAT',         real:'Lionel Messi',     tc:'#74ACDF', rarity:'legendary', img:'images/messi.webp',   stats:{SPD:85,FIN:97,DRB:99,AUR:100}},
  {id:'mbappe',  code:'LIGHTSPEED',       real:'Kylian Mbappé',    tc:'#4488FF', rarity:'epic',      img:'images/mbappe.jpg',   stats:{SPD:99,FIN:95,DRB:93,AUR:92}},

/* ═══════════════════════════════════════════
   GAME STATE
════════════════════════════════════════════ */
let playerHand   = [];
let aiHand       = [];

let battleActive = false;
let currentStreak = 0;
let bestStreak    = 0;
let wins=0, losses=0, draws=0;

// Persist streak & stats via localStorage
function loadSaved(){
  try{
    const s = JSON.parse(localStorage.getItem('tcg_stats')||'{}');
    bestStreak = s.best || 0;
    wins       = s.wins || 0;
    losses     = s.losses || 0;
    draws      = s.draws || 0;
  }catch(e){}
  soundEnabled = localStorage.getItem('tcg_sound') !== 'off';
  updateSoundBtn();
}
function saveSaved(){
  try{
    localStorage.setItem('tcg_stats', JSON.stringify({best:bestStreak,wins,losses,draws}));
    localStorage.setItem('tcg_sound', soundEnabled ? 'on' : 'off');
  }catch(e){}
}

/* ═══════════════════════════════════════════
   WEB AUDIO — PROCEDURAL SOUNDS
   (No external files needed, all synth)
════════════════════════════════════════════ */
let audioCtx = null;

function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.15, vol=0.18, delay=0){
  if(!soundEnabled) return;
  try{
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ac.currentTime + delay;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(vol, t+0.01);
    gain.gain.linearRampToValueAtTime(0, t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  }catch(e){}
}

function playReveal(){
  playTone(220,'sawtooth',0.08,0.12,0);
  playTone(440,'sawtooth',0.08,0.10,0.1);
}
function playClash(){
  playTone(60,'sawtooth',0.18,0.22,0);
  playTone(80,'square',0.14,0.18,0.06);
}
function playWin(){
  [440,554,659,880].forEach((f,i)=>playTone(f,'triangle',0.18,0.18,i*0.1));
}
function playLoss(){
  [440,370,330,220].forEach((f,i)=>playTone(f,'sawtooth',0.14,0.15,i*0.09));
}
function playClick(){
  playTone(660,'sine',0.06,0.12,0);
}
function playStreak(){
  [523,659,784,1047].forEach((f,i)=>playTone(f,'triangle',0.22,0.18,i*0.08));
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  updateSoundBtn();
  saveSaved();
  playClick();
}
function updateSoundBtn(){
  const btn = document.getElementById('sound-toggle');
  btn.textContent = soundEnabled ? '🔊 SFX' : '🔇 SFX';
  btn.classList.toggle('muted',!soundEnabled);
}

/* ═══════════════════════════════════════════
   PARTICLE ENGINE
════════════════════════════════════════════ */
const bc   = document.getElementById('burst-canvas');
const bctx = bc.getContext('2d');
let bursts = [];

function resizeCanvas(){
  bc.width  = window.innerWidth;
  bc.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnBurst(x, y, color, count=30){
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = Math.random()*14+3;
    bursts.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd - Math.random()*5,
      life:1,
      size:Math.random()*5+2,
      color,
      type:'dot',
    });
  }
  // Ring
  bursts.push({x,y,r:0,life:1,color,type:'ring'});
  bursts.push({x,y,r:0,life:1,color,type:'ring',delay:0.12});
}

function spawnCardBurst(el, color, count=20){
  const r = el.getBoundingClientRect();
  spawnBurst(r.left+r.width/2, r.top+r.height/2, color, count);
}

let lastT = 0;
function animBursts(t){
  requestAnimationFrame(animBursts);
  const dt = Math.min((t-lastT)/16.67, 3); lastT = t;
  bctx.clearRect(0,0,bc.width,bc.height);
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    if(b.delay){ b.delay-=dt*0.016; if(b.delay>0) continue; b.delay=0; }
    b.life-=0.025*dt;
    if(b.life<=0){bursts.splice(i,1);continue;}
    if(b.type==='ring'){
      b.r+=8*dt;
      bctx.beginPath();bctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      bctx.strokeStyle=b.color;bctx.globalAlpha=b.life*0.6;
      bctx.lineWidth=3;bctx.stroke();
    } else {
      b.x+=b.vx*b.life*dt*0.5;
      b.y+=b.vy*b.life*dt*0.5+0.3;
      bctx.beginPath();bctx.arc(b.x,b.y,b.size*b.life,0,Math.PI*2);
      bctx.fillStyle=b.color;bctx.globalAlpha=b.life*0.9;
      bctx.fill();
    }
    bctx.globalAlpha=1;
  }
}
requestAnimationFrame(animBursts);

/* ═══════════════════════════════════════════
   STATS UI
════════════════════════════════════════════ */
function updateStatsUI(){
  document.getElementById('stat-wins').textContent   = wins;
  document.getElementById('stat-losses').textContent = losses;
  document.getElementById('stat-draws').textContent  = draws;
  const total = wins+losses+draws;
  document.getElementById('stat-rate').textContent   = total ? Math.round(wins/total*100)+'%' : '0%';
  document.getElementById('win-streak').textContent  = currentStreak;
  document.getElementById('best-streak').textContent = bestStreak;
}

/* ═══════════════════════════════════════════
   CARD BUILDER
════════════════════════════════════════════ */
function buildStatsHtml(boss, targetKey){
  return COMBAT_STATS.map(stat=>{
    const active = stat.key === targetKey;
    return `<div class="card-stat-row ${active?'active-stat':''}" style="color:${active?boss.tc:'var(--text)'}">
      <span>${stat.name}</span><span>${boss.stats[stat.key]}</span>
    </div>`;
  }).join('');
}

function buildCard(boss, {isAI=false, index=0, targetKey='SPD'}={}){
  const statsHtml = buildStatsHtml(boss, targetKey);
  const rarityClass = `rarity-${boss.rarity}`;

  if(isAI){
    return `
    <div class="tcg-card ${rarityClass}" id="ai-card-${index}" tabindex="-1">
      <div class="card-face ai-sleeve" id="ai-sleeve-${index}">
        <div class="sleeve-hex"></div>
        <div class="sleeve-logo">VILLAIN<br>CUP</div>
        <div class="sleeve-hex"></div>
      </div>
      <div class="card-face player-front"
           style="border-color:${boss.tc};
                  background-image:url('${boss.img}')">
        <div class="card-badge" style="color:${boss.tc};border-color:${boss.tc};background:${boss.tc}18">
          ${boss.rarity.toUpperCase()}
        </div>
        <div class="name-banner" style="color:${boss.tc};text-shadow:0 0 12px ${boss.tc}88">
          ${boss.code}
        </div>
      </div>
      <div class="card-face stats-back"
           style="border-color:${boss.tc};
                  box-shadow:inset 0 0 20px ${boss.tc}18">
        <div class="card-header">
          <div class="card-code" style="color:${boss.tc};text-shadow:0 0 10px ${boss.tc}66">
            ${boss.code}
          </div>
          <div class="card-real">${boss.real}</div>
        </div>
        <div style="text-align:center;margin-bottom:8px;font-family:var(--font-ui);font-size:8px;color:var(--muted)">
          DEFENDING · ${targetKey}
        </div>
        ${statsHtml}
      </div>
    </div>`;
  } else {
    return `
    <div class="tcg-card playable ${rarityClass}" id="p-card-${index}"
         onclick="playCard(${index})" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' ')playCard(${index})"
         aria-label="Play ${boss.code}">
      <div class="card-face player-front"
           style="border-color:${boss.tc};
                  background-image:url('${boss.img}')">
        <div class="card-badge" style="color:${boss.tc};border-color:${boss.tc};background:${boss.tc}18">
          ${boss.rarity.toUpperCase()}
        </div>
        <div class="name-banner" style="color:${boss.tc};text-shadow:0 0 12px ${boss.tc}88">
          ${boss.code}
        </div>
      </div>
      <div class="card-face stats-back"
           style="border-color:${boss.tc};
                  box-shadow:inset 0 0 20px ${boss.tc}18">
        <div class="card-header">
          <div class="card-code" style="color:${boss.tc};text-shadow:0 0 10px ${boss.tc}66">
            ${boss.code}
          </div>
          <div class="card-real">${boss.real}</div>
        </div>
        ${statsHtml}
      </div>
    </div>`;
  }
}

/* ═══════════════════════════════════════════
   INIT ROUND
════════════════════════════════════════════ */
function initCardGame(){
  battleActive = false;
  document.getElementById('player-hand').style.pointerEvents = 'auto';

  // Reset log
  const log = document.getElementById('battle-log');
  log.style.borderColor = 'rgba(0,240,255,.18)';
  log.style.boxShadow   = 'inset 0 0 30px rgba(0,240,255,.04)';

  // Pick random combat stat
  targetStat = COMBAT_STATS[Math.floor(Math.random()*COMBAT_STATS.length)];
  document.getElementById('stat-name-display').textContent = targetStat.name;

  log.innerHTML = `
    <span style="color:var(--muted);font-size:10px;letter-spacing:.3em">
      UPLINK ESTABLISHED
    </span>
    <div style="margin-top:6px;color:var(--text);font-size:12px;letter-spacing:.2em">
      Stats are hidden on enemy cards. Select your combatant.
    </div>
  `;

  // Deal
  const deck = [...P].sort(()=>0.5-Math.random());
  playerHand = [deck[0], deck[1]];
  aiHand     = [deck[2], deck[3]];

  renderAIHand();
  renderPlayerHand();
  updateStatsUI();

  // VS Badge reset
  gsap.set('#vs-badge',{scale:0,opacity:0});
}

function renderAIHand(){
  const el = document.getElementById('enemy-zone');
  el.innerHTML = aiHand.map((boss,i)=>buildCard(boss,{isAI:true,index:i,targetKey:targetStat.key})).join('');
  gsap.fromTo('#enemy-zone .tcg-card',
    {y:-60,opacity:0,rotateX:-20},
    {y:0,opacity:1,rotateX:0,duration:.6,stagger:.12,ease:'back.out(1.4)'}
  );
}

function renderPlayerHand(){
  const el = document.getElementById('player-hand');
  el.innerHTML = playerHand.map((boss,i)=>buildCard(boss,{isAI:false,index:i,targetKey:targetStat.key})).join('');
  gsap.fromTo('#player-hand .tcg-card',
    {y:60,opacity:0,rotateX:20},
    {y:0,opacity:1,rotateX:0,duration:.6,stagger:.12,ease:'back.out(1.4)'}
  );
}

/* ═══════════════════════════════════════════
   PLAY CARD
════════════════════════════════════════════ */
function playCard(playerIdx){
  if(battleActive) return;
  battleActive = true;
  playClick();

  document.getElementById('player-hand').style.pointerEvents='none';

  const log          = document.getElementById('battle-log');
  const playerBoss   = playerHand[playerIdx];
  const playerCardEl = document.getElementById(`p-card-${playerIdx}`);
  const playerVal    = playerBoss.stats[targetStat.key];

  const aiIdx        = Math.floor(Math.random()*2);
  const aiBoss       = aiHand[aiIdx];
  const aiCardEl     = document.getElementById(`ai-card-${aiIdx}`);
  const aiSleeveEl   = document.getElementById(`ai-sleeve-${aiIdx}`);
  const aiVal        = aiBoss.stats[targetStat.key];

  const pDiscardIdx  = playerIdx === 0 ? 1 : 0;
  const aDiscardIdx  = aiIdx === 0 ? 1 : 0;

  // Discard un-chosen cards
  gsap.to(`#p-card-${pDiscardIdx}`,{opacity:0,scale:.8,y:20,duration:.4});
  gsap.to(`#ai-card-${aDiscardIdx}`,{opacity:0,scale:.8,y:-20,duration:.4});

  log.innerHTML=`<span style="color:var(--cyan)">COMBATANTS LOCKED // REVEALING ENEMY OPERATIVE…</span>`;

  // Step 1 — reveal AI photo
  setTimeout(()=>{
    playReveal();
    gsap.to(aiSleeveEl,{opacity:0,duration:.5,ease:'power2.out'});
    spawnCardBurst(aiCardEl, aiBoss.tc, 12);
    log.innerHTML=`<span style="color:${aiBoss.tc};font-size:18px;text-shadow:0 0 12px ${aiBoss.tc}66">
      ${aiBoss.code} ENTERS THE ARENA!
    </span>`;
  }, 700);

  // Step 2 — both cards flip
  setTimeout(()=>{
    playClash();
    gsap.to([playerCardEl,aiCardEl],{
      rotationY:180, duration:.65, ease:'back.out(1.4)',
      onComplete:()=>{
        spawnCardBurst(playerCardEl,'#ffffff',8);
        spawnCardBurst(aiCardEl,'#ffffff',8);
      }
    });
    gsap.to('#vs-badge',{scale:1,opacity:1,duration:.4,ease:'back.out(2)'});
    log.innerHTML=`<span style="color:var(--red);font-size:clamp(16px,3vw,24px)">⚡ CLASH IMMINENT ⚡</span>`;
  }, 1900);

  // Step 3 — resolution
  setTimeout(()=>{
    // Screen shake
    const shakeIntensity = 14;
    gsap.to('body',{
      x:()=>(Math.random()-.5)*shakeIntensity,
      y:()=>(Math.random()-.5)*shakeIntensity,
      duration:.05, repeat:7, yoyo:true,
      onComplete:()=>gsap.set('body',{x:0,y:0})
    });

    if(playerVal > aiVal){
      // WIN
      wins++;
      currentStreak++;
      if(currentStreak > bestStreak){ bestStreak = currentStreak; }

      log.style.borderColor = 'var(--green)';
      log.style.boxShadow   = 'inset 0 0 40px rgba(0,255,136,.08)';
      log.innerHTML = `
        <div class="log-result" style="color:var(--green);text-shadow:0 0 20px var(--green)">VICTORY</div>
        <div class="log-detail">${playerBoss.code} (${playerVal}) crushed ${aiBoss.code} (${aiVal})</div>
        <button class="btn-p" onclick="nextRound()">NEXT ROUND ›</button>
      `;
      playWin();
      spawnBurst(window.innerWidth/2, window.innerHeight*.45, '#00FF88', 55);
      gsap.to(playerCardEl,{scale:1.1,y:-16,boxShadow:`0 0 50px ${playerBoss.tc}`,duration:.45,ease:'back.out'});
      gsap.to(aiCardEl,{scale:.88,rotation:-6,opacity:.45,filter:'grayscale(100%) brightness(.4)',duration:.45});
      playerCardEl.classList.add('victorious');
      aiCardEl.classList.add('defeated');

      // Milestone at 3, 5, 10
      if([3,5,10].includes(currentStreak)){
        showMilestone(currentStreak);
        playStreak();
      }

    } else if(playerVal < aiVal){
      // LOSS
      losses++;
      currentStreak = 0;
      log.style.borderColor = 'var(--red)';
      log.style.boxShadow   = 'inset 0 0 40px rgba(255,0,46,.08)';
      log.innerHTML = `
        <div class="log-result" style="color:var(--red);text-shadow:0 0 20px var(--red)">DEFEAT</div>
        <div class="log-detail">${aiBoss.code} (${aiVal}) annihilated ${playerBoss.code} (${playerVal})</div>
        <button class="btn-p" onclick="nextRound()">TRY AGAIN ›</button>
      `;
      playLoss();
      spawnBurst(window.innerWidth/2, window.innerHeight*.45, '#FF002E', 55);
      gsap.to(aiCardEl,{scale:1.1,y:-16,boxShadow:`0 0 50px ${aiBoss.tc}`,duration:.45,ease:'back.out'});
      gsap.to(playerCardEl,{scale:.88,rotation:6,opacity:.45,filter:'grayscale(100%) brightness(.4)',duration:.45});
      aiCardEl.classList.add('victorious');
      playerCardEl.classList.add('defeated');

    } else {
      // DRAW
      draws++;
      log.style.borderColor = 'var(--gold)';
      log.style.boxShadow   = 'inset 0 0 40px rgba(255,184,0,.08)';
      log.innerHTML = `
        <div class="log-result" style="color:var(--gold);text-shadow:0 0 20px var(--gold)">STALEMATE</div>
        <div class="log-detail">Total gridlock — both scored ${playerVal}</div>
        <button class="btn-p" onclick="nextRound()">NEXT ROUND ›</button>
      `;
      spawnBurst(window.innerWidth/2, window.innerHeight*.45, '#FFB800', 30);
    }

    gsap.to('#vs-badge',{scale:0,opacity:0,duration:.3});
    updateStatsUI();
    saveSaved();

  }, 3100);
}

/* ═══════════════════════════════════════════
   NEXT ROUND (with wipe transition)
════════════════════════════════════════════ */
function nextRound(){
  playClick();
  const overlay = document.getElementById('round-overlay');

  // Slide overlay in
  gsap.to(overlay,{
    clipPath:'polygon(0 0,100% 0,100% 100%,0 100%)',
    duration:.35, ease:'power2.in',
    onComplete:()=>{
      // Reset all cards quickly
      gsap.set('.tcg-card',{opacity:0,y:0,scale:1,rotation:0,rotationY:0,filter:'none'});
      document.querySelectorAll('.tcg-card').forEach(el=>{
        el.classList.remove('victorious','defeated');
      });
      initCardGame();
      // Slide overlay out
      gsap.to(overlay,{
        clipPath:'polygon(100% 0,100% 0,100% 100%,100% 100%)',
        duration:.35, delay:.1, ease:'power2.out',
        onComplete:()=>{
          gsap.set(overlay,{clipPath:'polygon(0 0,0 0,0 100%,0 100%)'});
        }
      });
    }
  });
}

/* ═══════════════════════════════════════════
   MILESTONE BANNER
════════════════════════════════════════════ */
function showMilestone(n){
  const b = document.getElementById('milestone-banner');
  document.getElementById('milestone-text').textContent = `${n} WIN STREAK`;
  b.classList.add('show');
  setTimeout(()=>{
    gsap.to(b,{scale:0,opacity:0,duration:.5,ease:'back.in(2)',
      onComplete:()=>{b.classList.remove('show');gsap.set(b,{scale:1,opacity:1});}
    });
  }, 2200);
}

/* ═══════════════════════════════════════════
   BOOT
════════════════════════════════════════════ */
loadSaved();
updateStatsUI();

window.addEventListener('load', ()=>{
  // Short entrance delay then init
  setTimeout(initCardGame, 400);
});

</script>
