<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>World Cup History</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#050816;
      color:white;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      font-size:3rem;
      color:#00f7ff;
      text-shadow:0 0 20px #00f7ff;
    }

    #history-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(0,247,255,0.3);
      border-radius:20px;
      padding:20px;
      backdrop-filter:blur(10px);
      transition:0.3s;
      box-shadow:0 0 20px rgba(0,247,255,0.1);
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 0 25px rgba(0,247,255,0.4);
    }

    .year{
      font-size:2rem;
      color:#00f7ff;
      margin-bottom:15px;
    }

    .info{
      margin-bottom:10px;
      font-size:1.1rem;
    }

    .winner{
      color:#00ff9d;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <h1>🏆 FIFA World Cup History</h1>

  <div id="history-container"></div>

  <script type="module" src="history.js"></script>

</body>
</html>
